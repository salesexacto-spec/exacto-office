<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d0d1a">
  <meta name="description" content="Exacto Office - Virtual Office Space">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>Exacto Office</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect width="48" height="48" rx="12" fill="#1E90FF"/>
          <path d="M12 16h24v4H12zM12 24h18v4H12zM12 32h22v4H12z" fill="#fff" opacity="0.9"/>
        </svg>
        <h1>Exacto Office</h1>
      </div>
      <p class="login-subtitle">Enter the virtual workspace</p>
      <div class="login-form">
        <input type="text" id="input-name" placeholder="Your name" maxlength="20" autocomplete="off">
        <div class="color-picker">
          <label>Avatar color</label>
          <div class="color-options" id="color-options">
            <button class="color-btn selected" data-color="#1E90FF" style="background:#1E90FF"></button>
            <button class="color-btn" data-color="#FF6B6B" style="background:#FF6B6B"></button>
            <button class="color-btn" data-color="#51CF66" style="background:#51CF66"></button>
            <button class="color-btn" data-color="#FFD43B" style="background:#FFD43B"></button>
            <button class="color-btn" data-color="#CC5DE8" style="background:#CC5DE8"></button>
            <button class="color-btn" data-color="#FF922B" style="background:#FF922B"></button>
            <button class="color-btn" data-color="#20C997" style="background:#20C997"></button>
            <button class="color-btn" data-color="#F06595" style="background:#F06595"></button>
          </div>
        </div>
        <input type="password" id="input-code" placeholder="Room code" maxlength="30" autocomplete="off">
        <button id="btn-join" class="btn-primary">Join Office</button>
        <p id="login-error" class="error-text"></p>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" class="hidden">
    <!-- Top Bar -->
    <header id="top-bar">
      <div class="top-left">
        <svg width="28" height="28" viewBox="0 0 48 48" fill="none">
          <rect width="48" height="48" rx="12" fill="#1E90FF"/>
          <path d="M12 16h24v4H12zM12 24h18v4H12zM12 32h22v4H12z" fill="#fff" opacity="0.9"/>
        </svg>
        <span class="brand-name">Exacto Office</span>
        <span id="connection-status" class="status-dot connected" title="Connected"></span>
        <span id="recording-indicator" class="hidden">&#9210; REC</span>
      </div>
      <div class="top-center">
        <span id="current-zone">Lobby</span>
      </div>
      <div class="top-right">
        <button id="btn-edit" class="btn-small btn-edit" title="Edit Room">&#9999;&#65039;</button>
        <span id="online-count">0 online</span>
        <button id="btn-invite" class="btn-small">Invite</button>
      </div>
    </header>

    <div id="main-area">
      <!-- Left Sidebar -->
      <aside id="sidebar">
        <div class="sidebar-section">
          <h3 class="sidebar-title">Channels</h3>
          <ul id="channel-list" class="sidebar-list">
            <li class="channel-item active" data-channel="all-floors"># all-floors</li>
            <li class="channel-item" data-channel="exactosignage"># exactosignage</li>
            <li class="channel-item" data-channel="soporte"># soporte</li>
            <li class="channel-item" data-channel="desarrollo"># desarrollo</li>
            <li class="channel-item" data-channel="ventas"># ventas</li>
          </ul>
        </div>
        <div class="sidebar-section">
          <h3 class="sidebar-title">People <span id="people-count" class="count-badge">0</span></h3>
          <ul id="user-list" class="sidebar-list"></ul>
        </div>
      </aside>

      <!-- Canvas Area -->
      <div id="canvas-wrapper">
        <canvas id="office-canvas" width="1400" height="900"></canvas>
        <!-- Video Containers -->
        <div id="video-panel"></div>
        <!-- Mini Map -->
        <div id="minimap-container">
          <canvas id="minimap" width="200" height="129"></canvas>
        </div>
        <!-- Room Video Panel -->
        <div id="room-panel" class="hidden">
          <div id="room-panel-header">
            <span id="room-panel-title">&#127970; Room</span>
            <button id="room-panel-toggle">&#9660;</button>
          </div>
          <div id="room-panel-grid"></div>
        </div>
        <!-- Notification -->
        <div id="notification" class="hidden"></div>
      </div>

      <!-- Gallery View (Feature 10) -->
      <div id="gallery-view" class="hidden">
        <div id="gallery-header">
          <span class="gallery-title">Gallery View</span>
          <button id="btn-gallery-back" class="btn-small">Back to Map</button>
        </div>
        <div id="gallery-grid"></div>
      </div>
    </div>

    <!-- Whiteboard Modal (Feature 8) -->
    <div id="whiteboard-modal" class="hidden">
      <div class="modal-content">
        <div class="modal-header">
          <span id="wb-modal-title">Whiteboard</span>
          <button id="wb-modal-close">&times;</button>
        </div>
        <textarea id="wb-textarea" placeholder="Write notes, ideas, emoji..."></textarea>
        <button id="wb-save" class="btn-primary">Save</button>
      </div>
    </div>

    <!-- Status Dropdown (Feature 11) -->
    <div id="status-dropdown" class="hidden">
      <button class="status-option" data-status="available">&#127994; Available</button>
      <button class="status-option" data-status="out">&#128694; Out</button>
      <div id="status-note-row" class="hidden">
        <input type="text" id="status-note-input" placeholder="Back in X min / reason" maxlength="60">
      </div>
      <button class="status-option" data-status="focusing">&#127919; Focusing</button>
    </div>

    <!-- Controls -->
    <footer id="controls-bar">
      <button id="btn-mic" class="ctrl-btn active" title="Toggle Microphone">
        <svg class="icon-mic-on" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
        <svg class="icon-mic-off hidden" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="1" y1="1" x2="23" y2="23"/>
          <path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/>
          <path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2c0 .76-.13 1.49-.35 2.17"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <button id="btn-camera" class="ctrl-btn" title="Toggle Camera">
        <svg class="icon-cam-on" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="23 7 16 12 23 17 23 7"/>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
        </svg>
        <svg class="icon-cam-off hidden" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="1" y1="1" x2="23" y2="23"/>
          <path d="M21 21H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3m3-3h6l2 3h4a2 2 0 0 1 2 2v9.34m-7.72-2.06a4 4 0 1 1-5.56-5.56"/>
        </svg>
      </button>
      <button id="btn-screen" class="ctrl-btn" title="Share Screen">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
          <line x1="8" y1="21" x2="16" y2="21"/>
          <line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
      </button>
      <div class="ctrl-divider"></div>
      <button id="btn-record" class="ctrl-btn" title="Record Meeting">
        <span style="font-size:16px">&#9210;</span>
      </button>
      <button id="btn-gallery" class="ctrl-btn" title="Gallery View">
        <span style="font-size:16px">&#128248;</span>
      </button>
      <div class="ctrl-divider"></div>
      <button id="btn-status" class="ctrl-btn ctrl-status" title="Status: Available">
        <span class="status-indicator available"></span>
      </button>
      <div class="ctrl-divider"></div>
      <button id="btn-leave" class="ctrl-btn ctrl-danger" title="Leave Office">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
